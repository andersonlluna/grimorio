<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Crônica · Fase Alpha · Liga Supertecnicos 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1115; --bg-card:#1a1d26; --bg-surface:#232633; --bg-elevated:#2c2f3d;
  --text-primary:#f5f5f8; --text-secondary:#c8c8d0; --text-tertiary:#8a8a92;
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.20);
  --accent:#e8c87a; --accent-soft:rgba(232,200,122,0.10); --accent-strong:rgba(232,200,122,0.40);
  --tier-ss:#ff7878; --tier-ss-rgb:220,80,80;
  --tier-s:#f0c060;  --tier-s-rgb:232,168,80;
  --tier-a:#c8a4e8;  --tier-a-rgb:160,120,200;
  --tier-b:#88c0e0;  --tier-b-rgb:80,140,180;
  --tier-c:#a0c0a0;  --tier-c-rgb:120,140,120;
  --green:#6ed09a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text-primary);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 17px; line-height: 1.75;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::selection { background: var(--accent); color: var(--bg); }

.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,17,21,.96);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 1rem;
}
.top-nav-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.top-nav-link {
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 1.2px; color: var(--text-secondary);
  text-decoration: none; text-transform: uppercase;
  padding: 10px 16px; border: 1px solid var(--border); border-radius: 6px;
  transition: all .2s; white-space: nowrap;
}
.top-nav-link:hover, .top-nav-link.active {
  color: var(--accent); border-color: var(--accent-strong); background: var(--accent-soft);
}
.top-nav-brand {
  font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
}

.cronica-mode-tabs {
  display: flex; gap: 4px; max-width: 1100px;
  margin: 0 auto; padding: 8px 1rem 0;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 57px; z-index: 90;
  background: var(--bg);
}
.mode-tab {
  font-family: 'Cinzel', serif; font-size: 15px; font-weight: 500;
  letter-spacing: 1.2px; color: var(--text-secondary);
  background: none; border: none; padding: 14px 20px;
  cursor: pointer; transition: color .2s;
  border-bottom: 3px solid transparent;
  text-transform: uppercase;
}
.mode-tab:hover { color: var(--text-primary); }
.mode-tab.active {
  color: var(--accent); font-weight: 600;
  border-bottom-color: var(--accent);
}

.wrap {
  max-width: 1100px; margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
}

.hero {
  text-align: center; padding: 2rem 1rem 1.5rem;
  background: linear-gradient(180deg, var(--accent-soft) 0%, transparent 70%);
  border-radius: 16px;
  margin-bottom: 1.5rem;
}
.hero-overline {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--text-secondary); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 10px; font-weight: 600;
}
.hero-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(2.8rem, 9vw, 4.4rem);
  font-weight: 700; color: var(--accent);
  letter-spacing: clamp(2px, 1.2vw, 5px); line-height: 1;
  text-transform: uppercase;
}
.hero-meta {
  font-family: 'Inter', sans-serif; font-size: 15px;
  color: var(--text-secondary); margin-top: 14px;
}

.round-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 12px 0; flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.round-nav-arrow {
  font-family: 'Inter', sans-serif; font-size: 14px;
  color: var(--text-tertiary); background: transparent;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 14px; cursor: pointer;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.round-nav-arrow:hover:not(:disabled) {
  color: var(--accent); border-color: var(--accent-strong);
}
.round-nav-arrow:disabled {
  opacity: .3; cursor: not-allowed;
}
.round-pill {
  font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600;
  letter-spacing: 1.5px; color: var(--text-secondary);
  background: transparent; border: 1px solid var(--border-strong);
  padding: 10px 16px; border-radius: 6px;
  cursor: pointer; transition: all .2s;
  min-width: 48px; min-height: 48px;
}
.round-pill:hover:not(.active) {
  color: var(--text-primary); border-color: var(--border-strong);
}
.round-pill.active {
  color: var(--accent); border-color: var(--accent);
  background: var(--accent-soft); font-weight: 600;
}
.round-pill.locked { opacity: .4; cursor: not-allowed; }

.section-divider {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: var(--text-primary); margin: 2.25rem 0 1.25rem;
  text-transform: uppercase;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; max-width: 200px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .35;
}
.section-divider-icon { color: var(--accent); font-size: 9px; opacity: .7; }

.highlights {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.highlight {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; text-align: center;
}
.highlight-icon { font-size: 26px; margin-bottom: 8px; }
.highlight-title {
  font-family: 'Cinzel', serif; font-size: 16px;
  font-weight: 600; margin-bottom: 5px;
}
.highlight-sub {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.5;
}
.highlight.gold { border-color: rgba(var(--tier-s-rgb), .35); background: rgba(var(--tier-s-rgb), .05); }
.highlight.gold .highlight-title { color: var(--tier-s); }
.highlight.crimson { border-color: rgba(var(--tier-ss-rgb), .35); background: rgba(var(--tier-ss-rgb), .05); }
.highlight.crimson .highlight-title { color: var(--tier-ss); }
.highlight.amber { border-color: var(--accent-strong); background: var(--accent-soft); }
.highlight.amber .highlight-title { color: var(--accent); }

.confronto-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.25rem;
  margin-bottom: 1rem;
}

.confronto-grid {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 12px; align-items: center;
}

.criatura {
  text-align: center;
}
.criatura-img-box {
  position: relative; aspect-ratio: 4/5;
  max-width: 200px; margin: 0 auto 10px;
  border-radius: 10px; overflow: hidden;
  border: 2px solid var(--border);
  background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
  transition: transform .25s, border-color .25s;
}
.criatura.winner .criatura-img-box {
  border-color: var(--accent);
  border-width: 3px;
  box-shadow: 0 12px 32px rgba(0,0,0,.5),
              0 0 0 2px var(--accent-soft),
              0 0 24px rgba(232,200,122,.25);
}
.criatura.winner::before {
  content: '★ VENCEU';
  display: block;
  font-family: 'Cinzel', serif; font-size: 11px;
  font-weight: 700; letter-spacing: 2px;
  color: var(--accent); text-transform: uppercase;
  margin-bottom: 8px;
  text-align: center;
}
.criatura.loser { opacity: .5; }
.criatura.no-invoke { opacity: .5; }
.criatura.no-invoke .criatura-img-box { border-style: dashed; }

.criatura-img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
}
.criatura-img-fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; opacity: .55;
}
.criatura-tier-pill {
  position: absolute; top: 8px; right: 8px;
  font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
  border-radius: 6px; padding: 4px 11px;
  border: 1.5px solid; color: #fff;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
  letter-spacing: .5px;
}
.criatura-tier-pill.t-ss { background: rgba(var(--tier-ss-rgb), .85); border-color: var(--tier-ss); }
.criatura-tier-pill.t-s  { background: rgba(var(--tier-s-rgb),  .85); border-color: var(--tier-s);  }
.criatura-tier-pill.t-a  { background: rgba(var(--tier-a-rgb),  .80); border-color: var(--tier-a);  }
.criatura-tier-pill.t-b  { background: rgba(var(--tier-b-rgb),  .80); border-color: var(--tier-b);  }
.criatura-tier-pill.t-c  { background: rgba(var(--tier-c-rgb),  .75); border-color: var(--tier-c);  }
.criatura-name {
  font-family: 'Cinzel', serif; font-size: 17px;
  font-weight: 700; color: var(--text-primary);
  letter-spacing: .3px; line-height: 1.25;
}
.criatura.winner .criatura-name { color: var(--accent); }
.criatura.t-ss.winner .criatura-name { color: var(--tier-ss); }
.criatura.t-s.winner  .criatura-name { color: var(--tier-s); }
.criatura.t-a.winner  .criatura-name { color: var(--tier-a); }
.criatura.t-b.winner  .criatura-name { color: var(--tier-b); }
.criatura.t-c.winner  .criatura-name { color: var(--tier-c); }
.criatura-epithet {
  font-size: 13px; color: var(--text-secondary);
  margin-top: 4px; line-height: 1.45;
}
.criatura-team {
  font-family: 'Inter', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: 1.5px;
  color: var(--text-secondary); margin-top: 10px;
  text-transform: uppercase;
}

.vs-divider {
  font-family: 'Cinzel', serif;
  font-size: 26px; font-weight: 700;
  color: var(--accent); text-align: center;
}
.vs-margin {
  font-family: 'Cinzel', serif;
  font-size: 16px; color: var(--accent);
  letter-spacing: 1px; margin-top: 8px;
  white-space: nowrap; font-weight: 700;
  background: var(--accent-soft);
  border: 1px solid var(--accent-strong);
  border-radius: 6px;
  padding: 6px 12px;
  display: inline-block;
}
.vs-margin-label {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  color: var(--text-tertiary);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
  margin-top: 4px;
}

.pb-detail {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--border);
}
.pb-box {
  background: var(--bg-surface); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  line-height: 1.7;
}
.pb-box.winner { background: var(--accent-soft); border-color: var(--accent-strong); }
.pb-box-team {
  font-family: 'Cinzel', serif; font-size: 14px;
  font-weight: 700; margin-bottom: 6px;
  letter-spacing: .5px;
}
.pb-box.winner .pb-box-team { color: var(--accent); }
.pb-box-team.t-ss { color: var(--tier-ss); }
.pb-box-team.t-s  { color: var(--tier-s);  }
.pb-box-team.t-a  { color: var(--tier-a);  }
.pb-box-team.t-b  { color: var(--tier-b);  }
.pb-box-team.t-c  { color: var(--tier-c);  }
.pb-formula {
  color: var(--text-secondary); font-size: 13px;
}
.pb-total {
  margin-top: 6px; padding-top: 6px;
  border-top: 1px dashed var(--border-strong);
  color: var(--text-primary); font-weight: 700; font-size: 14px;
}

.cronica-text {
  background: var(--accent-soft);
  border: 1px solid var(--accent-strong);
  border-radius: 8px;
  padding: 18px 22px;
  margin-top: 16px;
}
.cronica-label {
  font-family: 'Cinzel', serif; font-size: 12px;
  color: var(--accent); letter-spacing: 2px;
  margin-bottom: 10px; font-weight: 700;
  text-transform: uppercase;
}
.cronica-body {
  font-size: 17px; color: var(--text-primary);
  line-height: 1.8; font-weight: 400;
}
.cronica-body strong.t-ss { color: var(--tier-ss); }
.cronica-body strong.t-s  { color: var(--tier-s); }
.cronica-body strong.t-a  { color: var(--tier-a); }
.cronica-body strong.t-b  { color: var(--tier-b); }
.cronica-body strong.t-c  { color: var(--tier-c); }

.rodada-pontuacao {
  display: grid; gap: 6px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem;
  margin-bottom: 1rem;
}
.rp-row {
  display: grid;
  grid-template-columns: 36px 1fr auto auto auto;
  gap: 12px; padding: 10px 14px;
  border-radius: 8px; align-items: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
}
.rp-row.rp-top {
  background: var(--accent-soft);
  border-color: var(--accent-strong);
}
.rp-pos {
  font-family: 'Cinzel', serif; font-size: 16px;
  font-weight: 700; color: var(--text-secondary);
  text-align: center;
}
.rp-row.rp-top .rp-pos { color: var(--accent); }
.rp-team {
  font-family: 'Cinzel', serif; font-size: 16px;
  font-weight: 600; color: var(--text-primary);
}
.rp-pts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700; color: var(--text-primary);
}
.rp-tier-badge {
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
  border-radius: 5px; padding: 4px 10px;
  border: 1.5px solid; color: #fff;
  letter-spacing: .5px; min-width: 38px; text-align: center;
}
.rp-tier-badge.t-ss { background: rgba(var(--tier-ss-rgb), .85); border-color: var(--tier-ss); }
.rp-tier-badge.t-s  { background: rgba(var(--tier-s-rgb),  .85); border-color: var(--tier-s);  }
.rp-tier-badge.t-a  { background: rgba(var(--tier-a-rgb),  .80); border-color: var(--tier-a);  }
.rp-tier-badge.t-b  { background: rgba(var(--tier-b-rgb),  .80); border-color: var(--tier-b);  }
.rp-tier-badge.t-c  { background: rgba(var(--tier-c-rgb),  .75); border-color: var(--tier-c);  }
.rp-tier-badge.no {
  background: transparent; border-color: var(--border-strong);
  color: var(--text-tertiary); font-size: 14px;
}
.rp-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.cq-tag {
  font-family: 'Inter', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: .5px;
  padding: 4px 9px; border-radius: 4px;
  white-space: nowrap;
}
.cq-tag.sob {
  background: rgba(var(--tier-s-rgb), .15);
  color: var(--tier-s);
  border: 1px solid rgba(var(--tier-s-rgb), .4);
}
.cq-tag.ara {
  background: rgba(var(--tier-b-rgb), .15);
  color: var(--tier-b);
  border: 1px solid rgba(var(--tier-b-rgb), .4);
}
.cq-tag.desp {
  background: rgba(var(--tier-a-rgb), .15);
  color: var(--tier-a);
  border: 1px solid rgba(var(--tier-a-rgb), .4);
}

.standings-mini {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.25rem;
  margin-top: 1.5rem;
}
.standings-mini-title {
  font-family: 'Cinzel', serif; font-size: 16px;
  font-weight: 700; color: var(--accent);
  letter-spacing: 2px; margin-bottom: 14px;
  text-transform: uppercase; text-align: center;
}
.standings-row {
  display: grid; grid-template-columns: 40px 1fr auto auto;
  gap: 14px; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center; font-size: 16px;
}
.standings-row:last-child { border-bottom: none; }
.standings-row.top1 {
  background: var(--accent-soft);
  border-radius: 6px;
  border-bottom: 1px solid var(--accent-strong);
}
.standings-row .pos {
  font-family: 'Cinzel', serif; color: var(--text-secondary);
  font-weight: 700; text-align: center; font-size: 17px;
}
.standings-row.top1 .pos { color: var(--accent); }
.standings-row .team-name {
  font-family: 'Cinzel', serif; color: var(--text-primary);
  font-weight: 600;
}
.standings-row .v {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; color: var(--text-primary);
  font-size: 14px;
}
.standings-row.top1 .v { color: var(--accent); }
.standings-row .pts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; color: var(--text-secondary);
}

.aguardando {
  text-align: center; padding: 4rem 2rem;
}
.aguardando-icon { font-size: 56px; margin-bottom: 1rem; }
.aguardando-title {
  font-family: 'Cinzel', serif; font-size: 24px;
  color: var(--accent); margin-bottom: .75rem;
  letter-spacing: 2px;
}
.aguardando-text {
  color: var(--text-secondary); max-width: 520px;
  margin: 0 auto; line-height: 1.75; font-size: 16px;
}
.aguardando code {
  background: var(--bg-surface); padding: 1px 7px;
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  color: var(--accent); font-size: 13px;
}

.portal-secreto {
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
}
.portal-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.25rem; position: relative;
  overflow: hidden;
}
.portal-card.unlocked {
  border-color: var(--tier-ss);
  background: linear-gradient(180deg, rgba(var(--tier-ss-rgb), .12) 0%, var(--bg-card) 60%);
}
.portal-team {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.portal-sigil { font-size: 28px; }
.portal-team-name {
  font-family: 'Cinzel', serif; font-size: 19px;
  font-weight: 700; color: var(--text-primary);
}
.portal-card.unlocked .portal-team-name { color: var(--tier-ss); }
.portal-condition {
  font-size: 15px; color: var(--text-secondary);
  line-height: 1.6; margin-bottom: 14px;
}
.portal-progress {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
}
.portal-bar {
  flex: 1; height: 8px;
  background: var(--bg-surface); border-radius: 4px;
  overflow: hidden; border: 1px solid var(--border);
}
.portal-bar-fill {
  height: 100%; background: var(--accent);
  transition: width .5s;
}
.portal-card.unlocked .portal-bar-fill { background: var(--tier-ss); }
.portal-bar-fill.complete { background: var(--tier-ss); }
.portal-progress-text {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--text-primary); white-space: nowrap; font-weight: 600;
}
.portal-card.unlocked .portal-progress-text { color: var(--tier-ss); font-weight: 600; }
.portal-status {
  position: absolute; top: 12px; right: 12px;
  font-family: 'Cinzel', serif; font-size: 11px;
  font-weight: 700; letter-spacing: 1.5px;
  padding: 5px 10px; border-radius: 4px;
  text-transform: uppercase;
}
.portal-status.locked {
  background: var(--bg-surface);
  color: var(--text-tertiary);
  border: 1px solid var(--border);
}
.portal-status.unlocked {
  background: var(--tier-ss); color: #fff;
  border: 1px solid var(--tier-ss);
}

.swipe-hint {
  display: none;
  text-align: center; font-size: 11px;
  color: var(--text-tertiary);
  padding: 8px; letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
}

@media (max-width: 700px) {
  .top-nav { padding: 10px 12px; }
  .top-nav-link { font-size: 12px; padding: 9px 12px; letter-spacing: 1px; }
  .top-nav-brand { font-size: 13px; }

  .cronica-mode-tabs { padding: 6px 12px 0; top: 53px; }
  .mode-tab { font-size: 13px; padding: 12px 16px; letter-spacing: 1px; }

  .wrap { padding: 1rem .75rem 3rem; }

  <div id="content-portal" style="display:none;"></div>
  <div id="content-liga" style="display:none;"></div>
</div>

<script>
const TIMES_ALPHA = ["Ironverdict","Icebergteam","Andorinha","CEEC","Varelitas","Lobonegro"];
const SIGIL = { Ironverdict:"⚙", Icebergteam:"❄", Andorinha:"🦅", CEEC:"🏔", Varelitas:"🐺", Lobonegro:"🌑" };
const SLUG = { Ironverdict:"ironverdict", Icebergteam:"icebergteam", Andorinha:"andorinha", CEEC:"ceec", Varelitas:"varelitas", Lobonegro:"lobonegro" };

let CONFRONTOS = [
  { rodada:1, duelos:[["Ironverdict","Lobonegro"],["Icebergteam","Varelitas"],["CEEC","Andorinha"]] },
  { rodada:2, duelos:[["Ironverdict","Andorinha"],["Icebergteam","CEEC"],["Varelitas","Lobonegro"]] },
  { rodada:3, duelos:[["Ironverdict","CEEC"],["Icebergteam","Lobonegro"],["Andorinha","Varelitas"]] },
  { rodada:4, duelos:[["Ironverdict","Varelitas"],["CEEC","Lobonegro"],["Icebergteam","Andorinha"]] },
  { rodada:5, duelos:[["Ironverdict","Icebergteam"],["CEEC","Varelitas"],["Andorinha","Lobonegro"]] },
];

let CRIATURAS = {};
let DADOS = {};
let RODADAS_PROCESSADAS = [];
let GLOBAL_STATE = null;
let CURRENT_ROUND = null;
let CURRENT_MODE = "rodadas";

function calcTier(pts, conquistas) {
  if (pts >= 115 && conquistas.includes("Soberano")) return "SS";
  if (pts >= 100 && (conquistas.includes("Soberano") || conquistas.includes("Despertar"))) return "S";
  if (pts >= 90) return "A"; if (pts >= 75) return "B"; if (pts >= 50) return "C";
  return null;
}
function calcDespertar(pts) {
  if (pts >= 110) return 38; if (pts >= 100) return 26;
  if (pts >= 90) return 18;   if (pts >= 80) return 10; return 0;
}
function calcConquistas(pts, ranking) {
  const cqs = [];
  if (ranking === 1) cqs.push("Soberano");
  else if (ranking === 2 || ranking === 3) cqs.push("Arauto");
  if (calcDespertar(pts) > 0) cqs.push("Despertar");
  return cqs;
}
function tierBonus(tier) { return {C:0,B:3,A:6,S:10,SS:15}[tier] || 0; }
function calcPB(pts, tier, conquistas) {
  if (!tier) return pts;
  let pb = pts + tierBonus(tier);
  if (conquistas.includes("Soberano")) pb += 20;
  if (conquistas.includes("Arauto")) pb += 15;
  pb += calcDespertar(pts);
  return pb;
}

function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
  return h;
}
function sortearCriaturaDeterministico(time, rodada, tier) {
  if (!tier) return null;
  const grimorio = CRIATURAS[time];
  if (!grimorio) return null;
  const cands = grimorio.creatures.filter(c => c.tier === tier && !c.secret);
  if (cands.length === 0) return null;
  const idx = hashStr(`${time}|r${rodada}|${tier}`) % cands.length;
  const c = cands[idx];
  return {
    name: c.name, epithet: c.epithet, file: c.file, tier: c.tier, slug: SLUG[time]
  };
}

function checkSSSecreto(time, state) {
  if (time === "Ironverdict") return (state.vitorias[time]||0) >= 3;
  if (time === "Icebergteam") return state.iceMaxPts >= 95;
  if (time === "Andorinha") return (state.andoRodadas80||0) >= 3;
  if (time === "CEEC") return (state.ceecSoberanos||0) >= 2;
  if (time === "Varelitas") return state.varelitasMargem === true;
  if (time === "Lobonegro") return state.loboVitoriaBaixa === true;
  return false;
}
function getSSProgress(time, state) {
  if (time === "Ironverdict") {
    const v = state.vitorias[time] || 0;
    return { current: v, target: 3, label: `${v}/3 vitórias` };
  }
  if (time === "Icebergteam") {
    const m = state.iceMaxPts || 0;
    return { current: Math.min(m, 95), target: 95, label: `Máx: ${m.toFixed(2)} / 95 pts` };
  }
  if (time === "Andorinha") {
    const r = state.andoRodadas80 || 0;
    return { current: r, target: 3, label: `${r}/3 rodadas ≥80` };
  }
  if (time === "CEEC") {
    const s = state.ceecSoberanos || 0;
    return { current: s, target: 2, label: `${s}/2 Soberanos` };
  }
  if (time === "Varelitas") {
    return { current: state.varelitasMargem ? 1 : 0, target: 1, label: state.varelitasMargem ? "Cumprido ✓" : "Aguardando margem ≥15 PB" };
  }
  if (time === "Lobonegro") {
    return { current: state.loboVitoriaBaixa ? 1 : 0, target: 1, label: state.loboVitoriaBaixa ? "Cumprido ✓" : "Aguardando vitória <70 pts" };
  }
  return { current: 0, target: 1, label: "—" };
}
function getSSCondition(time) {
  return {
    Ironverdict: "Vencer 3 dos 5 confrontos da fase",
    Icebergteam: "Pontuar ≥95 em qualquer rodada",
    Andorinha: "Pontuar ≥80 em 3 das 5 rodadas",
    CEEC: "Maior pontuação da liga em 2 rodadas distintas",
    Varelitas: "Vencer confronto com margem ≥15 PB",
    Lobonegro: "Vencer confronto pontuando <70 pts"
  }[time] || "—";
}

function updateSSState(state, rodadaData, duelResults) {
  rodadaData.forEach(td => {
    if (td.time === "Icebergteam") state.iceMaxPts = Math.max(state.iceMaxPts||0, td.pts);
    if (td.time === "Andorinha" && td.pts >= 80) state.andoRodadas80 = (state.andoRodadas80||0) + 1;
    if (td.time === "CEEC" && td.conquistas.includes("Soberano")) state.ceecSoberanos = (state.ceecSoberanos||0) + 1;
  });
  duelResults.forEach(d => {
    if (d.winner) state.vitorias[d.winner] = (state.vitorias[d.winner]||0) + 1;
    if ([d.a,d.b].includes("Varelitas") && d.winner === "Varelitas") {
      const margin = Math.abs(d.pbA - d.pbB);
      if (margin >= 15) state.varelitasMargem = true;
    }
    if (d.winner === "Lobonegro") {
      const loboData = rodadaData.find(r => r.time === "Lobonegro");
      if (loboData && loboData.pts < 70) state.loboVitoriaBaixa = true;
    }
  });
}

function parseDados(csv) {
  const data = {};
  csv.trim().split(/\r?\n/).forEach((line, i) => {
    if (i === 0 || !line.trim()) return;
    const parts = line.split(",");
    if (parts.length < 3) return;
    const r = parseInt(parts[0]);
    const t = parts[1].trim();
    const p = parseFloat(parts[2]);
    if (!TIMES_ALPHA.includes(t) || isNaN(r) || isNaN(p)) return;
    if (!data[r]) data[r] = [];
    data[r].push({time:t, pts:p});
  });
  return data;
}
function parseConfrontos(csv) {
  const map = {};
  csv.trim().split(/\r?\n/).forEach((line, i) => {
    if (i === 0 || !line.trim()) return;
    const [r, a, b] = line.split(",").map(s => s.trim());
    const rod = parseInt(r);
    if (!TIMES_ALPHA.includes(a) || !TIMES_ALPHA.includes(b)) return;
    if (!map[rod]) map[rod] = [];
    map[rod].push([a, b]);
  });
  return Object.keys(map).sort((x,y) => +x - +y).map(r => ({
    rodada: parseInt(r), duelos: map[r]
  }));
}

function processRodada(rodada, raw) {
  const sorted = [...raw].sort((x,y) => y.pts - x.pts);
  const teamData = sorted.map((td, i) => {
    const ranking = i + 1;
    const conquistas = calcConquistas(td.pts, ranking);
    const tier = calcTier(td.pts, conquistas);
    const pb = calcPB(td.pts, tier, conquistas);
    const criatura = sortearCriaturaDeterministico(td.time, rodada, tier);
    const desp = calcDespertar(td.pts);
    return { time: td.time, pts: td.pts, ranking, conquistas, tier, pb, criatura, despertarBonus: desp };
  });

  const conf = CONFRONTOS.find(c => c.rodada === rodada);
  const duelResults = [];
  if (conf) {
    for (const [a, b] of conf.duelos) {
      const tA = teamData.find(t => t.time === a);
      const tB = teamData.find(t => t.time === b);
      if (!tA || !tB) continue;
      let winner;
      if (tA.pb > tB.pb) winner = a;
      else if (tB.pb > tA.pb) winner = b;
      else if (tA.pts > tB.pts) winner = a;
      else winner = a;
      duelResults.push({
        a, b, pbA: tA.pb, pbB: tB.pb, winner,
        ptsA: tA.pts, ptsB: tB.pts,
        tierA: tA.tier, tierB: tB.tier,
        cqsA: tA.conquistas, cqsB: tB.conquistas,
        despA: tA.despertarBonus, despB: tB.despertarBonus,
        criaturaA: tA.criatura, criaturaB: tB.criatura
      });
    }
  }
  return { rodada, teamData, duelResults };
}

const TIER_LABEL = { SS:"Lendário", S:"Épico", A:"Raro", B:"Incomum", C:"Comum" };
const REGIAO = {
  Ironverdict:"Ferrathis", Icebergteam:"Kelvrak", Andorinha:"Skyvara",
  CEEC:"Nordheim", Varelitas:"Sylvorn", Lobonegro:"Valdrek"
};

const CRONICA_TEMPLATES = {
  esmagadora: [
    "{winnerCreature} desceu sobre o campo de batalha com a fúria de um portal {winnerTierLabel}. {loserCreature} mal teve tempo de erguer a guarda — {marginText} de diferença, dominância absoluta.",
    "Quando {winnerCreature} foi invocada de {winnerRegion}, o desfecho já estava escrito. {loserCreature} resistiu, mas {marginText} é uma sentença, não um placar.",
    "O portal {winnerTierLabel} se abriu e {winnerCreature} emergiu. {loserCreature} caiu antes mesmo do segundo movimento — uma vitória de {marginText} que será lembrada como execução."
  ],
  apertada: [
    "{winnerCreature} e {loserCreature} se chocaram em equilíbrio quase impossível. No fim, {marginText} decidiram a balança a favor de {winnerTeam}.",
    "Foi um duelo digno de crônica: {winnerCreature} contra {loserCreature}, golpe a golpe. {winnerTeam} venceu por {marginText} — uma margem que diz tudo sobre a tensão da batalha.",
    "Por {marginText}, {winnerCreature} prevaleceu sobre {loserCreature}. Outra rodada, outro vento, e a história poderia ter sido diferente."
  ],
  modesta: [
    "{winnerCreature} controlou o ritmo do confronto contra {loserCreature}. {marginText} de margem — não foi espetacular, mas foi suficiente.",
    "{winnerTeam} colheu a vitória através de {winnerCreature}. {loserCreature} entregou resistência, mas não o suficiente: {marginText} de PB ao final.",
    "Trabalho metódico de {winnerCreature} contra {loserCreature}. {winnerTeam} fecha o confronto com {marginText} de vantagem."
  ],
  semInvocacao: [
    "{loserTeam} chegou ao confronto com o grimório fechado — pontuação insuficiente para invocar. {winnerCreature} fez o que tinha que fazer: {marginText} de margem.",
    "Sem criatura para invocar, {loserTeam} viu {winnerCreature} cruzar a arena e selar o destino do confronto. Vitória de {winnerTeam} por {marginText}.",
    "{winnerCreature} encontrou a arena vazia: {loserTeam} não atingiu o limiar de invocação. Resultado: {winnerTeam} vence por {marginText}."
  ],
  semNenhumaInvocacao: [
    "Um confronto raro — nenhum dos dois grimórios se abriu. {winnerTeam} venceu por pontos brutos, {marginText} de diferença.",
    "Quando o portal não responde, decide-se na pontuação crua. {winnerTeam} fechou com {marginText} de vantagem sobre {loserTeam}."
  ]
};

function gerarCronica(rodada, d) {
  const aWin = d.winner === d.a;
  const winner = { team: aWin ? d.a : d.b, criatura: aWin ? d.criaturaA : d.criaturaB };
  const loser  = { team: aWin ? d.b : d.a, criatura: aWin ? d.criaturaB : d.criaturaA };
  const margin = Math.abs(d.pbA - d.pbB);

  let categoria;
  if (!winner.criatura && !loser.criatura) categoria = "semNenhumaInvocacao";
  else if (!loser.criatura) categoria = "semInvocacao";
  else if (margin >= 25) categoria = "esmagadora";
  else if (margin <= 8)  categoria = "apertada";
  else categoria = "modesta";

  const templates = CRONICA_TEMPLATES[categoria];
  const idx = hashStr(`r${rodada}|${winner.team}x${loser.team}|${categoria}`) % templates.length;
  const tpl = templates[idx];

  const wn = winner.criatura
    ? `<strong class="t-${winner.criatura.tier.toLowerCase()}">${winner.criatura.name.split(',')[0].split(' — ')[0]}</strong>`
    : `<strong>${winner.team}</strong>`;
  const ln = loser.criatura
    ? `<strong class="t-${loser.criatura.tier.toLowerCase()}">${loser.criatura.name.split(',')[0].split(' — ')[0]}</strong>`
    : `<strong>${loser.team}</strong>`;

  return tpl
    .replace(/\{winnerCreature\}/g, wn)
    .replace(/\{loserCreature\}/g, ln)
    .replace(/\{winnerTeam\}/g, `<strong>${winner.team}</strong>`)
    .replace(/\{loserTeam\}/g, `<strong>${loser.team}</strong>`)
    .replace(/\{marginText\}/g, margin >= 1 ? `${margin.toFixed(1)} PB` : `menos de 1 PB`)
    .replace(/\{winnerTierLabel\}/g, winner.criatura ? TIER_LABEL[winner.criatura.tier] : "—")
    .replace(/\{winnerRegion\}/g, REGIAO[winner.team] || winner.team);
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeAttr(s) { return escapeHtml(s).replace(/"/g,"&quot;"); }

function renderRoundNav(currentRod) {
  const allRounds = CONFRONTOS.map(c => c.rodada).sort((a,b) => a-b);
  const processed = new Set(RODADAS_PROCESSADAS.map(r => r.rodada));

  const idxNow = allRounds.indexOf(currentRod);
  const prevRod = idxNow > 0 ? allRounds[idxNow - 1] : null;
  const nextRod = idxNow < allRounds.length - 1 ? allRounds[idxNow + 1] : null;

  let html = `<div class="round-nav">`;
  html += `<button class="round-nav-arrow" ${prevRod === null ? 'disabled' : ''} onclick="goToRound(${prevRod})">←</button>`;
  for (const r of allRounds) {
    const isActive = r === currentRod;
    const isProcessed = processed.has(r);
    html += `<button class="round-pill ${isActive ? 'active' : ''} ${isProcessed ? '' : 'locked'}" onclick="goToRound(${r})">R${r}</button>`;
  }
  html += `<button class="round-nav-arrow" ${nextRod === null ? 'disabled' : ''} onclick="goToRound(${nextRod})">→</button>`;
  html += `</div><div class="swipe-hint">← arraste para mudar de rodada →</div>`;
  return html;
}

function calcStandingsAt(rodada) {
  const stats = {};
  TIMES_ALPHA.forEach(t => stats[t] = { vitorias: 0, pts: 0 });
  for (const r of RODADAS_PROCESSADAS) {
    if (r.rodada > rodada) break;
    r.teamData.forEach(td => stats[td.time].pts += td.pts);
    r.duelResults.forEach(d => { if (d.winner) stats[d.winner].vitorias++; });
  }
  return TIMES_ALPHA.map(t => ({time: t, ...stats[t]}))
    .sort((a, b) => b.vitorias - a.vitorias || b.pts - a.pts);
}

function renderRound(rodada) {
  const round = RODADAS_PROCESSADAS.find(r => r.rodada === rodada);

  if (!round) {
    return renderAguardando(rodada);
  }

  const sorted = [...round.teamData].sort((x,y) => y.pts - x.pts);
  const soberano = sorted[0];
  const maxPB = round.teamData.reduce((m, t) => t.pb > m.pb ? t : m, round.teamData[0]);

  const ssBeforeThisRound = {};
  const tempState = { vitorias:{}, iceMaxPts:0, andoRodadas80:0, ceecSoberanos:0, varelitasMargem:false, loboVitoriaBaixa:false };
  for (const r of RODADAS_PROCESSADAS) {
    if (r.rodada >= rodada) break;
    updateSSState(tempState, r.teamData, r.duelResults);
  }
  const ssBefore = {};
  TIMES_ALPHA.forEach(t => ssBefore[t] = checkSSSecreto(t, tempState));
  updateSSState(tempState, round.teamData, round.duelResults);
  const ssAfter = {};
  TIMES_ALPHA.forEach(t => ssAfter[t] = checkSSSecreto(t, tempState));
  const newlyUnlocked = TIMES_ALPHA.filter(t => !ssBefore[t] && ssAfter[t]);

  let html = `
    <div class="hero">
      <div class="hero-overline">Crônica · Fase Alpha</div>
      <div class="hero-title">Rodada ${rodada}</div>
      <div class="hero-meta">${round.duelResults.length} confrontos · ${round.teamData.length} invocadores</div>
    </div>
    ${renderRoundNav(rodada)}
  `;

  html += `
    <div class="section-divider">
      <span class="section-divider-icon">◆</span>
      Destaques
      <span class="section-divider-icon">◆</span>
    </div>
    <div class="highlights">
      <div class="highlight gold">
        <div class="highlight-icon">👑</div>
        <div class="highlight-title">${SIGIL[soberano.time]} ${soberano.time}</div>
        <div class="highlight-sub">Soberano · ${soberano.pts.toFixed(2)} pts</div>
      </div>
      <div class="highlight amber">
        <div class="highlight-icon">⚡</div>
        <div class="highlight-title">Maior PB</div>
        <div class="highlight-sub">${SIGIL[maxPB.time]} ${maxPB.time} · ${maxPB.pb.toFixed(2)}</div>
      </div>
      ${newlyUnlocked.length > 0
        ? `<div class="highlight crimson">
             <div class="highlight-icon">✦</div>
             <div class="highlight-title">SS Secreto</div>
             <div class="highlight-sub">${newlyUnlocked.map(t => SIGIL[t] + " " + t).join(", ")} desbloqueou!</div>
           </div>`
        : `<div class="highlight">
             <div class="highlight-icon">🔒</div>
             <div class="highlight-title">SS Secreto</div>
             <div class="highlight-sub">Nenhum desbloqueado</div>
           </div>`
      }
    </div>
  `;

  if (round.duelResults.length > 0) {
    html += `
      <div class="section-divider">
        <span class="section-divider-icon">◆</span>
        Pontuação Cartola
        <span class="section-divider-icon">◆</span>
      </div>
      <div class="rodada-pontuacao">
    `;
    sorted.forEach((td, i) => {
      const ranking = i + 1;
      const tagSob = td.conquistas.includes("Soberano") ? '<span class="cq-tag sob">👑 Soberano</span>' : '';
      const tagAra = td.conquistas.includes("Arauto") ? '<span class="cq-tag ara">🥇 Arauto</span>' : '';
      const tagDesp = td.conquistas.includes("Despertar") ? `<span class="cq-tag desp">💀 Despertar +${td.despertarBonus}</span>` : '';
      const tierBadge = td.tier ? `<span class="rp-tier-badge t-${td.tier.toLowerCase()}">${td.tier}</span>` : '<span class="rp-tier-badge no">—</span>';

      html += `
        <div class="rp-row ${ranking === 1 ? 'rp-top' : ''}">
          <div class="rp-pos">${ranking}º</div>
          <div class="rp-team">${SIGIL[td.time]} ${td.time}</div>
          <div class="rp-pts">${td.pts.toFixed(2)} pts</div>
          ${tierBadge}
          <div class="rp-tags">${tagSob}${tagAra}${tagDesp}</div>
        </div>
      `;
    });
    html += `</div>`;

    html += `
      <div class="section-divider">
        <span class="section-divider-icon">◆</span>
        ${round.duelResults.length} Confrontos
        <span class="section-divider-icon">◆</span>
      </div>
    `;
    for (const d of round.duelResults) {
      html += renderConfronto(d, rodada);
    }
  } else {
    html += `<div class="aguardando" style="padding:2rem;">
      <div class="aguardando-text">Confrontos desta rodada ainda não foram definidos no <code>confrontos.csv</code>.</div>
    </div>`;
  }

  const standings = calcStandingsAt(rodada);
  html += `
    <div class="standings-mini">
      <div class="standings-mini-title">Classificação após Rodada ${rodada}</div>
  `;
  standings.forEach((row, i) => {
    const pos = i + 1;
    html += `
      <div class="standings-row ${pos === 1 ? 'top1' : ''}">
        <div class="pos">${pos}</div>
        <div class="team-name">${SIGIL[row.time]} ${row.time}</div>
        <div class="v">${row.vitorias}V</div>
        <div class="pts">${row.pts.toFixed(1)} pts</div>
      </div>
    `;
  });
  html += `</div>`;

  return html;
}

function renderConfronto(d, rodada) {
  const aWin = d.winner === d.a;
  const margin = Math.abs(d.pbA - d.pbB);

  return `
    <div class="confronto-card">
      <div class="confronto-grid">
        ${renderCriatura(d.a, d.criaturaA, d.tierA, aWin, !aWin)}
        <div class="vs-divider">×<div class="vs-margin">+${margin.toFixed(1)} PB</div><div class="vs-margin-label">Vantagem</div></div>
        ${renderCriatura(d.b, d.criaturaB, d.tierB, !aWin, aWin)}
      </div>
      <div class="pb-detail">
        ${renderPBBox(d.a, d.ptsA, d.tierA, d.cqsA, d.despA, d.pbA, aWin)}
        ${renderPBBox(d.b, d.ptsB, d.tierB, d.cqsB, d.despB, d.pbB, !aWin)}
      </div>
      <div class="cronica-text">
        <div class="cronica-label">✦ Crônica</div>
        <div class="cronica-body">${gerarCronica(rodada, d)}</div>
      </div>
    </div>
  `;
}

function renderCriatura(time, criatura, tier, isWinner, isLoser) {
  const tierClass = criatura ? `t-${criatura.tier.toLowerCase()}` : "no-invoke";
  const stateClass = isWinner ? "winner" : (isLoser ? "loser" : "");

  let imgContent;
  if (criatura) {
    const url = `https://cdn.jsdelivr.net/gh/andersonlluna/grimorio@main/${SLUG[time]}/${encodeURIComponent(criatura.file).replace(/'/g,"%27")}`;
    imgContent = `<img class="criatura-img" src="${url}" alt="${escapeAttr(criatura.name)}"
                       onerror="this.outerHTML='<div class=\\'criatura-img-fallback\\'>${SIGIL[time]}</div>'">`;
  } else {
    imgContent = `<div class="criatura-img-fallback">🔒</div>`;
  }

  const tierBadge = criatura
    ? `<div class="criatura-tier-pill t-${criatura.tier.toLowerCase()}">${criatura.tier}</div>`
    : "";

  const nameHtml = criatura
    ? `<div class="criatura-name">${escapeHtml(criatura.name.split(',')[0].split(' — ')[0])}</div>
       <div class="criatura-epithet">${escapeHtml(criatura.epithet || "")}</div>`
    : `<div class="criatura-name">Sem invocação</div>
       <div class="criatura-epithet">Pontuação insuficiente (&lt;65)</div>`;

  return `
    <div class="criatura ${tierClass} ${stateClass}">
      <div class="criatura-img-box">
        ${imgContent}
        ${tierBadge}
      </div>
      ${nameHtml}
      <div class="criatura-team">${SIGIL[time]} ${time}</div>
    </div>
  `;
}

function renderPBBox(time, pts, tier, conquistas, despBonus, pb, isWinner) {
  const tClass = tier ? `t-${tier.toLowerCase()}` : "";
  const tBonus = tierBonus(tier);

  let formula = `${pts.toFixed(2)} pts`;
  if (tier) formula += ` + ${tBonus} (${tier})`;
  if (conquistas.includes("Soberano")) formula += ` + 20 (Sob.)`;
  if (conquistas.includes("Arauto")) formula += ` + 15 (Arauto)`;
  if (despBonus > 0) formula += ` + ${despBonus} (Desp.)`;

  return `
    <div class="pb-box ${isWinner ? 'winner' : ''}">
      <div class="pb-box-team ${tClass}">${SIGIL[time]} ${time}</div>
      <div class="pb-formula">${formula}</div>
      <div class="pb-total">= ${pb.toFixed(2)} PB</div>
    </div>
  `;
}

function renderAguardando(rodada) {
  return `
    <div class="hero">
      <div class="hero-overline">Crônica · Fase Alpha</div>
      <div class="hero-title">Rodada ${rodada}</div>
      <div class="hero-meta">Aguardando dados</div>
    </div>
    ${renderRoundNav(rodada)}
    <div class="aguardando">
      <div class="aguardando-icon">⏳</div>
      <div class="aguardando-title">Aguardando o Cartola</div>
      <div class="aguardando-text">A Rodada ${rodada} ainda não foi disputada. Quando os pontos forem registrados em <code>dados.csv</code>, esta página atualiza automaticamente.</div>
    </div>
  `;
}

function renderModeRodadas() {
  if (CURRENT_ROUND === null) {
    return `
      <div class="aguardando">
        <div class="aguardando-icon">🏁</div>
        <div class="aguardando-title">Campeonato ainda não começou</div>
        <div class="aguardando-text">Quando a Rodada 1 for disputada e o <code>dados.csv</code> for atualizado, a Crônica começa.</div>
      </div>
    `;
  }
  return renderRound(CURRENT_ROUND);
}

function renderModePortal() {
  const state = GLOBAL_STATE || { vitorias:{}, iceMaxPts:0, andoRodadas80:0, ceecSoberanos:0, varelitasMargem:false, loboVitoriaBaixa:false };

  let html = `
    <div class="hero">
      <div class="hero-overline">Liga · Acompanhamento</div>
      <div class="hero-title">Portal Secreto</div>
      <div class="hero-meta">Cada grimório tem uma SS Secreta — desbloqueada por uma condição única</div>
    </div>
    <div class="portal-secreto">
  `;

  for (const time of TIMES_ALPHA) {
    const unlocked = checkSSSecreto(time, state);
    const progress = getSSProgress(time, state);
    const pct = progress.target === 0 ? 0 : Math.min(100, (progress.current / progress.target) * 100);
    html += `
      <div class="portal-card ${unlocked ? 'unlocked' : ''}">
        <div class="portal-status ${unlocked ? 'unlocked' : 'locked'}">${unlocked ? '✦ Desbloqueado' : '🔒 Bloqueado'}</div>
        <div class="portal-team">
          <span class="portal-sigil">${SIGIL[time]}</span>
          <span class="portal-team-name">${time}</span>
        </div>
        <div class="portal-condition">${getSSCondition(time)}</div>
        <div class="portal-progress">
          <div class="portal-bar">
            <div class="portal-bar-fill ${pct >= 100 ? 'complete' : ''}" style="width:${pct}%"></div>
          </div>
          <div class="portal-progress-text">${progress.label}</div>
        </div>
      </div>
    `;
  }

  html += `</div>`;
  return html;
}

function renderModeLiga() {
  if (RODADAS_PROCESSADAS.length === 0) {
    return `
      <div class="aguardando">
        <div class="aguardando-icon">🏁</div>
        <div class="aguardando-title">Aguardando primeira rodada</div>
        <div class="aguardando-text">A classificação geral aparecerá aqui quando a primeira rodada for processada.</div>
      </div>
    `;
  }
  const lastRound = RODADAS_PROCESSADAS[RODADAS_PROCESSADAS.length - 1].rodada;
  const standings = calcStandingsAt(lastRound);

  let html = `
    <div class="hero">
      <div class="hero-overline">Liga · Geral</div>
      <div class="hero-title">Classificação</div>
      <div class="hero-meta">Após Rodada ${lastRound} · ${RODADAS_PROCESSADAS.length}/5 rodadas processadas</div>
    </div>
    <div class="standings-mini">
  `;
  standings.forEach((row, i) => {
    const pos = i + 1;
    html += `
      <div class="standings-row ${pos === 1 ? 'top1' : ''}">
        <div class="pos">${pos}</div>
        <div class="team-name">${SIGIL[row.time]} ${row.time}</div>
        <div class="v">${row.vitorias}V</div>
        <div class="pts">${row.pts.toFixed(1)} pts</div>
      </div>
    `;
  });
  html += `</div>`;
  return html;
}

function setMode(mode) {
  CURRENT_MODE = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('content-rodadas').style.display = mode === 'rodadas' ? 'block' : 'none';
  document.getElementById('content-portal').style.display = mode === 'portal' ? 'block' : 'none';
  document.getElementById('content-liga').style.display = mode === 'liga' ? 'block' : 'none';

  if (mode === 'rodadas') {
    document.getElementById('content-rodadas').innerHTML = renderModeRodadas();
  } else if (mode === 'portal') {
    document.getElementById('content-portal').innerHTML = renderModePortal();
  } else if (mode === 'liga') {
    document.getElementById('content-liga').innerHTML = renderModeLiga();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToRound(rodada) {
  if (rodada == null) return;
  const allRounds = CONFRONTOS.map(c => c.rodada).sort((a,b) => a-b);
  if (!allRounds.includes(rodada)) return;
  CURRENT_ROUND = rodada;
  history.replaceState(null, "", `#r${rodada}`);
  document.getElementById('content-rodadas').innerHTML = renderModeRodadas();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setupSwipe() {
  const container = document.getElementById('content-rodadas');
  let startX = 0, startY = 0, deltaX = 0, deltaY = 0, tracking = false;

  container.addEventListener('touchstart', e => {
    if (CURRENT_MODE !== 'rodadas') return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    deltaX = 0; deltaY = 0; tracking = true;
  }, { passive: true });

  container.addEventListener('touchmove', e => {
    if (!tracking) return;
    const t = e.touches[0];
    deltaX = t.clientX - startX;
    deltaY = t.clientY - startY;
  }, { passive: true });

  container.addEventListener('touchend', () => {
    if (!tracking) return;
    tracking = false;
    if (Math.abs(deltaX) < 60) return;
    if (Math.abs(deltaY) > Math.abs(deltaX)) return;

    const allRounds = CONFRONTOS.map(c => c.rodada).sort((a,b) => a-b);
    const idx = allRounds.indexOf(CURRENT_ROUND);
    if (deltaX < 0 && idx < allRounds.length - 1) goToRound(allRounds[idx + 1]);
    else if (deltaX > 0 && idx > 0) goToRound(allRounds[idx - 1]);
  });
}

async function init() {
  try {
    const [csvRes, confRes] = await Promise.all([
      fetch("./dados.csv?t=" + Date.now()),
      fetch("./confrontos.csv?t=" + Date.now())
    ]);

    if (csvRes.ok) {
      DADOS = parseDados(await csvRes.text());
    }
    if (confRes.ok) {
      const parsed = parseConfrontos(await confRes.text());
      if (parsed.length > 0) CONFRONTOS = parsed;
    }

    const promises = TIMES_ALPHA.map(async time => {
      try {
        const res = await fetch(`./data/${SLUG[time]}.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        CRIATURAS[time] = await res.json();
      } catch (err) {
        console.warn(`Falha ao carregar ${SLUG[time]}.json:`, err);
      }
    });
    await Promise.all(promises);

    GLOBAL_STATE = { vitorias:{}, iceMaxPts:0, andoRodadas80:0, ceecSoberanos:0, varelitasMargem:false, loboVitoriaBaixa:false };
    Object.keys(DADOS).map(Number).sort((a,b) => a-b).forEach(rod => {
      const result = processRodada(rod, DADOS[rod]);
      RODADAS_PROCESSADAS.push(result);
      updateSSState(GLOBAL_STATE, result.teamData, result.duelResults);
    });

    const hash = window.location.hash;
    const m = hash && hash.match(/#r(\d+)/);
    if (m) {
      const r = parseInt(m[1]);
      if (CONFRONTOS.find(c => c.rodada === r)) CURRENT_ROUND = r;
    }
    if (CURRENT_ROUND === null && RODADAS_PROCESSADAS.length > 0) {
      CURRENT_ROUND = RODADAS_PROCESSADAS[RODADAS_PROCESSADAS.length - 1].rodada;
    }
    if (CURRENT_ROUND === null) {
      CURRENT_ROUND = CONFRONTOS[0]?.rodada || 1;
    }

    setMode('rodadas');
    setupSwipe();
  } catch (err) {
    document.getElementById('content-rodadas').innerHTML = `<div class="aguardando"><div class="aguardando-icon">⚠️</div><div class="aguardando-title">Erro ao carregar</div><div class="aguardando-text">${err.message}</div></div>`;
  }
}

window.addEventListener("DOMContentLoaded", init);
window.addEventListener("hashchange", () => {
  const m = window.location.hash.match(/#r(\d+)/);
  if (m) {
    const r = parseInt(m[1]);
    if (CONFRONTOS.find(c => c.rodada === r)) {
      CURRENT_ROUND = r;
      setMode('rodadas');
    }
  }
});
</script>
</body>
</html>
