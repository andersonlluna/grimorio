<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varelitas — Grimório · Liga Supertecnicos 2026</title>
<meta name="description" content="Varelitas — Lobos Épicos de Sylvorn · Grimório da Liga Supertecnicos">
<meta property="og:title" content="Varelitas — Grimório">
<meta property="og:description" content="Lobos Épicos do Bosque · Sylvorn · Liga Supertecnicos 2026">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/grimorio.css">
<style>
  /* Sobrescritas específicas do Varelitas — só o accent e o glow do header */
  :root { --accent: #6a9a5a; }
  .header {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(106,154,90,0.09) 0%, transparent 65%),
      radial-gradient(ellipse at 50% 0%, rgba(196,124,43,0.05) 0%, transparent 80%);
  }
  .sigil { filter: drop-shadow(0 0 20px rgba(106,154,90,0.4)); }
</style>
</head>
<body>

<div class="header" id="grimorio-header">
  <!-- Renderizado por initGrimorio() -->
</div>

<div class="stats-bar" id="grimorio-stats">
  <!-- Renderizado por initGrimorio() -->
</div>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="show('grimorio', this)">Grimório</button>
    <button class="nav-btn" onclick="show('galeria', this)">Galeria</button>
    <button class="nav-btn" onclick="show('lore', this)">Lore</button>
  </div>
</nav>

<div class="content">
  <div class="section active" id="s-grimorio"></div>
  <div class="section" id="s-galeria"></div>
  <div class="section" id="s-lore"></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-body">
      <div class="modal-tier" id="modal-tier"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-epithet" id="modal-epithet"></div>
      <div class="modal-lore" id="modal-lore"></div>
    </div>
  </div>
</div>

<script src="../assets/grimorio.js"></script>
<script>
  initGrimorio('../data/varelitas.json');
</script>

</body>
</html>
