<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varelitas — Grimório · Liga Supertecnicos 2026</title>
<meta name="description" content="Varelitas — Grimório da Liga Supertecnicos">
<meta property="og:title" content="Varelitas — Grimório">
<meta property="og:description" content="Liga Supertecnicos · Temporada 2026">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/grimorio.css">
<style>
  :root {
    --accent: #7ac060;
    --accent-soft: rgba(122,192,96, 0.10);
    --accent-strong: rgba(122,192,96, 0.35);
  }
  .header {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(122,192,96, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.02) 0%, transparent 80%);
  }
</style>
</head>
<body>

<div class="header" id="grimorio-header"></div>
<div class="stats-bar" id="grimorio-stats"></div>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="show('grimorio', this)">Grimório</button>
    <button class="nav-btn" onclick="show('galeria', this)">Galeria</button>
    <button class="nav-btn" onclick="show('lore', this)">Lore</button>
  </div>
</nav>

<div class="content">
  <div class="section active" id="s-grimorio"></div>
  <div class="section" id="s-galeria"></div>
  <div class="section" id="s-lore"></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-body">
      <div class="modal-tier" id="modal-tier"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-epithet" id="modal-epithet"></div>
      <div class="modal-lore" id="modal-lore"></div>
    </div>
  </div>
</div>

<script src="../assets/grimorio.js"></script>
<script>
  initGrimorio('../data/varelitas.json');
</script>

</body>
</html>
